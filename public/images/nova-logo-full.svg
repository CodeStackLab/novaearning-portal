<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" width="100%" height="100%">
  <defs>
    <!-- Primary Rich Metallic Gold Gradient -->
    <linearGradient id="goldGradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3B3"/>
      <stop offset="25%" stop-color="#DFC15D"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="75%" stop-color="#E6C875"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>

    <!-- Bright Gold Highlight Gradient -->
    <linearGradient id="goldGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#AA771C"/>
      <stop offset="35%" stop-color="#FDE08D"/>
      <stop offset="50%" stop-color="#FFF8D6"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>

    <!-- Deep Gold Shadow Gradient -->
    <linearGradient id="goldGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#8B6508"/>
      <stop offset="100%" stop-color="#4A3502"/>
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LEFT EMBLEM (Center X=48, Center Y=48) -->
  <g transform="translate(0, 0)">
    <!-- Outer Elegant Golden Ring -->
    <path d="M 48 8 A 40 40 0 1 1 19.7 76.3 A 40 40 0 0 1 48 8 Z" 
          fill="none" stroke="url(#goldGradLight)" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M 48 11 A 37 37 0 1 1 21.8 74.2 A 37 37 0 0 1 48 11 Z" 
          fill="none" stroke="url(#goldGradDark)" stroke-width="0.9" opacity="0.7"/>

    <!-- Starburst / Flare at Top-Right on Ring -->
    <g transform="translate(76, 20)" filter="url(#goldGlow)">
      <circle cx="0" cy="0" r="3.5" fill="#FFF8D6"/>
      <path d="M -12 0 L 12 0 M 0 -12 L 0 12" stroke="#FFF8D6" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M -6 -6 L 6 6 M -6 6 L 6 -6" stroke="#FDE08D" stroke-width="0.8"/>
    </g>

    <!-- 3D Luxury Chiseled Letter N Inside Ring -->
    <path d="M 27 28 L 39 37 L 39 68 L 27 59 Z" fill="url(#goldGradMain)"/>
    <path d="M 27 28 L 33 33 L 33 63 L 27 59 Z" fill="url(#goldGradLight)"/>
    <path d="M 57 28 L 69 37 L 69 68 L 57 59 Z" fill="url(#goldGradMain)"/>
    <path d="M 63 33 L 69 37 L 69 68 L 63 63 Z" fill="url(#goldGradLight)"/>
    <path d="M 27 28 L 39 28 L 69 68 L 57 68 Z" fill="url(#goldGradLight)"/>
    <path d="M 33 28 L 39 28 L 69 68 L 63 68 Z" fill="url(#goldGradDark)" opacity="0.7"/>
  </g>

  <!-- RIGHT TYPOGRAPHY: N O V A (Horizontal, Prominent & Complete) -->
  <g transform="translate(102, 24)" fill="url(#goldGradMain)">
    <!-- N -->
    <path d="M 4 48 L 4 6 L 14 6 L 40 38 L 40 6 L 50 6 L 50 48 L 40 48 L 14 16 L 14 48 Z"/>
    <!-- O -->
    <path d="M 85 27 C 85 13.5 94 5 106 5 C 118 5 127 13.5 127 27 C 127 40.5 118 49 106 49 C 94 49 85 40.5 85 27 Z M 95 27 C 95 35 100 40 106 40 C 112 40 117 35 117 27 C 117 19 112 14 106 14 C 100 14 95 19 95 27 Z"/>
    <!-- V -->
    <path d="M 140 6 L 151 6 L 166 41 L 181 6 L 192 6 L 172 48 L 160 48 Z"/>
    <!-- A -->
    <path d="M 224 48 L 238 6 L 249 6 L 263 48 L 252 48 L 248 37 L 239 37 L 235 48 Z M 243 28 L 246 28 L 244 14 Z"/>
  </g>
</svg>
