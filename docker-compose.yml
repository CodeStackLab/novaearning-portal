version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: napp-container
    ports:
      - "8082:80"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./db:/usr/src/app/db
    command: npm run dev
    restart: unless-stopped
