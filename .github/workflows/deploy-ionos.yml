name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php
          php -l migrate.php

      - name: Install SFTP Client library
        run: npm install ssh2-sftp-client

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          cp public/.htaccess dist/.htaccess
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp api/.htaccess dist/api/.htaccess
          cp cron.php dist/
          cp config.php dist/
          cp migrate.php dist/
          cp database.sql dist/

      - name: Deploy to IONOS via SFTP
        env:
          SSHPASS: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          TARGET_DIR="${{ secrets.IONOS_REMOTE_PATH }}"
          [ -z "$TARGET_DIR" ] && TARGET_DIR="."
          echo "Connecting to IONOS SFTP server and uploading to $TARGET_DIR..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P ${{ secrets.IONOS_SFTP_PORT }} ${{ secrets.IONOS_SFTP_USER }}@${{ secrets.IONOS_SFTP_HOST }} <<EOF
          -mkdir $TARGET_DIR
          cd $TARGET_DIR
          put -r dist/* .
          quit
          EOF

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

