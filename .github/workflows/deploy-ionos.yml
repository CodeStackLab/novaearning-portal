name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php
          php -l migrate.php

      - name: Install SFTP Client library
        run: npm install ssh2-sftp-client

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp cron.php dist/
          cp config.php dist/
          cp migrate.php dist/
          cp database.sql dist/

      - name: Deploy to IONOS via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: ${{ secrets.IONOS_SFTP_PORT }}
          protocol: sftp
          local-dir: ./dist/
          server-dir: ./${{ secrets.IONOS_REMOTE_PATH }}/

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

