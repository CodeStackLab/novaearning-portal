name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php

      - name: Install SFTP Client library
        run: npm install ssh2-sftp-client

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp cron.php dist/
          cp config.php dist/

      - name: Deploy application over SFTP
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          node -e "
          const { Client } = require('ssh2');
          const conn = new Client();

          conn.on('ready', () => {
            console.log('SSH Connection Successful!');
            conn.end();
          }).on('error', (err) => {
            console.error('Connection error:', err);
            process.exit(1);
          }).connect({
            host: process.env.SFTP_HOST,
            port: parseInt(process.env.SFTP_PORT || '22'),
            username: process.env.SFTP_USER,
            password: process.env.SFTP_PASSWORD,
            tryKeyboard: true,
            debug: (msg) => console.log('DEBUG:', msg)
          });
          "

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

