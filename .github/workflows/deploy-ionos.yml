name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php
          php -l migrate.php

      - name: Install SFTP Client library
        run: npm install ssh2-sftp-client

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp cron.php dist/
          cp config.php dist/
          cp migrate.php dist/
          cp database.sql dist/

      - name: Deploy application over SFTP
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
          SFTP_REMOTE_PATH: ${{ secrets.IONOS_REMOTE_PATH }}
        run: |
          node -e "
          const Client = require('ssh2-sftp-client');
          const sftp = new Client();

          async function deploy() {
            try {
              console.log('Connecting to IONOS SFTP server...');
              await sftp.connect({
                host: process.env.SFTP_HOST,
                port: parseInt(process.env.SFTP_PORT || '22'),
                username: process.env.SFTP_USER,
                password: process.env.SFTP_PASSWORD,
                tryKeyboard: true,
                retries: 3,
                timeout: 30000
              });
              const targetDir = process.env.SFTP_REMOTE_PATH || '.';
              console.log('Connected successfully. Uploading files to ' + targetDir + '...');
              await sftp.uploadDir('dist', targetDir);
              console.log('SFTP deployment finished successfully.');
            } catch (err) {
              console.error('Deployment error:', err.message);
              process.exit(1);
            } finally {
              await sftp.end();
            }
          }

          deploy();
          "

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

