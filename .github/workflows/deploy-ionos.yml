name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php

      - name: Install transfer tools
        run: sudo apt-get update && sudo apt-get install --yes sshpass rsync

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp cron.php dist/
          cp config.php dist/

      - name: Deploy application over SSH/SFTP
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          sshpass -p "$SFTP_PASSWORD" rsync -avz -e "ssh -o StrictHostKeyChecking=no -p $SFTP_PORT" dist/ "$SFTP_USER@$SFTP_HOST:./"

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

