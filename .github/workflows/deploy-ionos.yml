name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php
          php -l migrate.php

      - name: Validate deployment secrets
        env:
          IONOS_SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          IONOS_SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT }}
          IONOS_SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          IONOS_SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          for name in IONOS_SFTP_HOST IONOS_SFTP_PORT IONOS_SFTP_USER IONOS_SFTP_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Required GitHub Actions secret $name is not configured."
              exit 1
            fi
          done

      - name: Prepare deployment package
        env:
          IONOS_SOURCE_SECRET: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          mkdir -p dist
          cp -r public/* dist/
          cp public/.htaccess dist/.htaccess
          cp public/nova-ui.css dist/nova-ui.css
          cp public/admin/.htaccess dist/admin/.htaccess
          cp public/admin-dashboard/.htaccess dist/admin-dashboard/.htaccess
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp api/.htaccess dist/api/.htaccess
          cp cron.php dist/
          cp config.php dist/
          cp migrate.php dist/
          cp database.sql dist/
          cp PROJECT_SETUP_DOCUMENTATION.md dist/
          php -r '$token = hash_hmac("sha256", "nova-cron-v1", getenv("IONOS_SOURCE_SECRET")); file_put_contents("dist/cron-auth.php", "<?php define(\"NOVA_CRON_TOKEN_HASH\", \"" . hash("sha256", $token) . "\");");'

      - name: Deploy to IONOS via SFTP
        env:
          SSHPASS: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          TARGET_DIR="${{ secrets.IONOS_REMOTE_PATH }}"
          [ -z "$TARGET_DIR" ] && TARGET_DIR="."
          echo "Connecting to IONOS SFTP server and uploading to $TARGET_DIR..."
          sshpass -e sftp -o StrictHostKeyChecking=no -P ${{ secrets.IONOS_SFTP_PORT }} ${{ secrets.IONOS_SFTP_USER }}@${{ secrets.IONOS_SFTP_HOST }} <<EOF
          -mkdir $TARGET_DIR
          cd $TARGET_DIR
          put -r dist/* .
          # Explicitly replace the main entry files. Some shared-hosting SFTP
          # servers can retain an older root HTML file after a recursive put.
          put dist/dashboard.html dashboard.html
          put dist/admin.html admin.html
          put dist/nova-ui.css nova-ui.css
          put dist/cron-auth.php cron-auth.php
          put dist/.htaccess .htaccess
          quit
          EOF

      - name: Run protected commission scheduler smoke test
        env:
          IONOS_SOURCE_SECRET: ${{ secrets.IONOS_SFTP_PASSWORD }}
        run: |
          TOKEN="$(php -r 'echo hash_hmac("sha256", "nova-cron-v1", getenv("IONOS_SOURCE_SECRET"));')"
          curl --fail --silent --show-error --retry 2 --max-time 90 \
            -H "X-Nova-Cron-Token: $TOKEN" \
            https://novaearning.com/cron.php

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."
