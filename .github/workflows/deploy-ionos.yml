name: Deploy production to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate JavaScript
        run: |
          node --check public/app.js
          node --check public/admin-app.js

      - name: Validate PHP
        run: |
          find api -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l cron.php
          php -l config.php

      - name: Prepare deployment package
        run: |
          mkdir -p dist
          cp -r public/* dist/
          mkdir -p dist/api
          cp -r api/* dist/api/
          cp cron.php dist/
          cp config.php dist/

      - name: Deploy application over SFTP
        uses: wlixxd/SFTP-deploy-action@v1.5.0
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          port: ${{ secrets.IONOS_SFTP_PORT }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          server-dir: ./
          local-dir: dist/
          exclude: |
            **/uploads/**

      - name: Deployment summary
        run: echo "IONOS production deployment completed successfully."

